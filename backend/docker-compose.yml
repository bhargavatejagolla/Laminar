version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: laminar_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: laminar
    ports:
      - "5433:5432"
    volumes:
      - laminar_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: laminar_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - laminar_redis_data:/data

volumes:
  laminar_postgres_data:
  laminar_redis_data: